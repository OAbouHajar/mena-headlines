<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Intelligence Platform</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%23111110'/><rect x='4' y='10' width='16' height='2' rx='1' fill='%234e7aa0'/><rect x='4' y='15' width='20' height='2' rx='1' fill='%234e7aa0' opacity='.65'/><rect x='4' y='20' width='12' height='2' rx='1' fill='%234e7aa0' opacity='.4'/><circle cx='26' cy='10' r='3' fill='%23b83030'/></svg>">
    <link rel="stylesheet" href="/src/styles.css">

    cfg: {
        connectionString: "InstrumentationKey=***REMOVED***;IngestionEndpoint=https://centralus-2.in.applicationinsights.azure.com/;LiveEndpoint=https://centralus.livediagnostics.monitor.azure.com/;ApplicationId=***REMOVED***"
    }});
    </script>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <button class="btn-icon" id="toggleSidebarBtn" title="Toggle Sidebar (S)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            </button>
            <div class="header-logo">
                <!-- Signal / broadcast mark -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 6h12M2 10h17M2 14h10"/><circle cx="20" cy="6" r="2" fill="currentColor" stroke="none"/></svg>
            </div>
            <h1 data-i18n="appTitle">Multi-Channel Live Viewer</h1>
        </div>

        <!-- AI Summary Bar -->
        <div class="header-intel-bar" id="headerIntelBar" title="Open AI Analysis">
            <span class="header-intel-dot" id="headerIntelDot"></span>
            <div class="header-intel-scroll">
                <span class="header-intel-text" id="headerIntelText"></span>
            </div>
            <span class="header-intel-risk" id="headerIntelRisk"></span>
        </div>

        <div class="header-controls">
            <div class="layout-group" id="layoutGroup"></div>
            <button class="btn btn-intel" id="intelBtn" aria-label="AI Intelligence">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                  <!-- Brain outline left lobe -->
                  <path d="M9 3C6.5 3 4 5 4 7.5c0 1.2.5 2.3 1.3 3.1C4.5 11.5 4 12.7 4 14c0 2.2 1.5 4 3.5 4.5"/>
                  <!-- Brain outline right lobe -->
                  <path d="M15 3c2.5 0 5 2 5 4.5 0 1.2-.5 2.3-1.3 3.1.8.9 1.3 2.1 1.3 3.4 0 2.2-1.5 4-3.5 4.5"/>
                  <!-- Center divide -->
                  <line x1="12" y1="3" x2="12" y2="18.5"/>
                  <!-- Neural nodes -->
                  <circle cx="7.5" cy="8" r="1" fill="currentColor" stroke="none"/>
                  <circle cx="7" cy="13" r="1" fill="currentColor" stroke="none"/>
                  <circle cx="16.5" cy="8" r="1" fill="currentColor" stroke="none"/>
                  <circle cx="17" cy="13" r="1" fill="currentColor" stroke="none"/>
                  <circle cx="12" cy="11" r="1" fill="currentColor" stroke="none"/>
                  <!-- Synapse connections -->
                  <path d="M7.5 8 L12 11 L16.5 8"/>
                  <path d="M7 13 L12 11 L17 13"/>
                  <!-- Stem -->
                  <path d="M10 18.5 Q12 20 14 18.5"/>
                </svg>
                <span>AI Intelligence</span>
            </button>
            <button class="btn-icon" id="theatreBtn" title="Theatre Mode (T)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
            </button>
            <button class="btn-icon" id="refreshBtn" title="Refresh All (R)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            </button>
            <div class="auth-area" id="authArea" style="display:none">
                <button class="btn btn-secondary btn-sm" id="authBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span id="authLabel" data-i18n="signIn">Sign In</span>
                </button>
                <div class="auth-dropdown" id="authDropdown"></div>
            </div>
            <!-- langToggleBtn hidden until EN content is ready -->
            <button class="btn btn-secondary btn-sm" id="langToggleBtn" style="display:none">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/></svg>
                <span data-i18n="langLabel">EN</span>
            </button>
        </div>
    </header>

    <!-- Main -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <!-- Tabs -->
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="channels" id="tabChannels" data-i18n="channels">Channels</button>
                <button class="sidebar-tab" data-tab="updates" id="tabUpdates" data-i18n="updates">Updates</button>
            </div>

            <!-- Channels Panel -->
            <div class="sidebar-panel active" id="panelChannels">
                <div class="sidebar-header">
                    <h3 data-i18n="channels">Channels</h3>
                    <div class="sidebar-header-right">
                        <span id="channelCount">0</span>
                        <button class="btn-icon-sm" id="addChannelBtn" title="Add Channel" aria-label="Add Channel">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>
                        </button>
                        <button class="btn-icon-sm" id="resetBtn" title="Reset to defaults">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                        </button>
                    </div>
                </div>
                <div class="sidebar-content" id="channelList"></div>
            </div>

            <!-- Updates Panel -->
            <div class="sidebar-panel" id="panelUpdates">
                <div class="sidebar-header">
                    <h3 data-i18n="updates">Updates</h3>
                </div>
                <div class="updates-feed" id="updatesFeed">
                    <div class="update-empty" id="updatesEmpty" data-i18n="updatesEmpty">Headlines will appear here as the ticker loads.</div>
                </div>
            </div>
        </aside>

        <!-- Video Area -->
        <main class="video-area">
            <div class="video-grid" id="videoGrid"></div>
        </main>
    </div>

    <!-- Add/Edit Channel Modal -->
    <div class="modal-overlay" id="channelModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle" data-i18n="addNewChannel">Add New Channel</h2>
                <button class="btn-icon-sm" id="modalCloseBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-field">
                    <label for="modalUrl">YouTube URL</label>
                    <div class="url-input-row">
                        <input type="text" id="modalUrl" placeholder="https://www.youtube.com/@ChannelName">
                        <button class="btn btn-primary btn-sm" id="modalResolveBtn" type="button">Resolve</button>
                    </div>
                    <span class="form-hint">Paste a channel link — name, handle, ID &amp; logo will be filled automatically</span>
                </div>
                <hr class="modal-divider">
                <div class="form-field">
                    <label for="modalName" data-i18n="channelName">Channel Name</label>
                    <input type="text" id="modalName" data-i18n-placeholder="channelNamePlaceholder" placeholder="e.g. Al Jazeera">
                </div>
                <div class="form-field">
                    <label for="modalHandle" data-i18n="youtubeHandle">YouTube Handle</label>
                    <input type="text" id="modalHandle" data-i18n-placeholder="handlePlaceholder" placeholder="@aljazeera">
                </div>
                <div class="form-field">
                    <label for="modalChannelId"><span data-i18n="channelIdLabel">Channel ID</span> <span class="required" data-i18n="channelIdRequired">(required for embed)</span></label>
                    <input type="text" id="modalChannelId" data-i18n-placeholder="channelIdPlaceholder" placeholder="UCfiwzLy-8yKzIbsmZTzxDgw">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-ghost" id="modalCancelBtn" data-i18n="cancel">Cancel</button>
                <button class="btn btn-primary" id="modalSaveBtn" data-i18n="saveChannel">Save Channel</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- News Ticker -->
    <div class="news-ticker">
        <div class="ticker-track" id="tickerTrack" aria-live="polite">
            <!-- Ticker items injected via JS -->
        </div>
    </div>

    <!-- Intelligence Backdrop -->
    <div class="intel-backdrop" id="intelBackdrop"></div>

    <!-- Intelligence Slide-Over Panel -->
    <aside class="intel-panel" id="intelPanel" role="complementary" aria-label="AI Intelligence Panel">
        <div class="intel-panel-header">
            <div class="intel-panel-title-group">
                <div class="intel-panel-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M12 2a4 4 0 0 0-4 4 4 4 0 0 0 1.1 2.76C6.27 10.1 4 12.85 4 16h16c0-3.15-2.27-5.9-5.1-7.24A4 4 0 0 0 16 6a4 4 0 0 0-4-4z"/><path d="M9 16v2a3 3 0 0 0 6 0v-2"/></svg>
                    Live Intelligence Summary
                </div>
                <span class="intel-timestamp" id="intelTimestamp"></span>
            </div>
            <!-- History navigation -->
            <div class="intel-history-nav" id="intelHistoryNav">
                <button class="btn-icon-sm" id="intelOlderBtn" title="Older report">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <span class="intel-history-label" id="intelHistoryLabel"></span>
                <button class="btn-icon-sm" id="intelNewerBtn" title="Newer report" disabled>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
            <div class="intel-panel-actions">
                <button class="btn-icon-sm" id="intelRefreshBtn" title="Refresh analysis">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                </button>
                <button class="btn-icon-sm" id="intelCloseBtn" title="Close (Esc)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <div class="intel-panel-body" id="intelBody">
            <div class="intel-empty">
                <p>Click refresh or wait for analysis to load.</p>
            </div>
        </div>
    </aside>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
